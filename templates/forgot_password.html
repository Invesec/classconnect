{% extends 'base.html' %}
{% block title %}Forgot Password – ClassConnect{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card animate-up">
    <div class="auth-logo">
      <div class="auth-logo-icon">🔒</div>
      <div class="auth-title">Reset your password</div>
      <div class="auth-sub">Enter your account email and we'll send you a reset link</div>
    </div>

    <form method="POST" id="forgot-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="forgot-btn">
        <span id="forgot-text">Send Reset Link</span>
        <span id="forgot-spinner" style="display:none;">⏳</span>
      </button>
    </form>

    <div class="auth-footer">
      Remembered your password? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
<script>
document.getElementById('forgot-form').addEventListener('submit', () => {
  document.getElementById('forgot-text').style.display = 'none';
  document.getElementById('forgot-spinner').style.display = 'inline';
  document.getElementById('forgot-btn').disabled = true;
});
</script>
{% endblock %}
