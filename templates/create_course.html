{% extends 'base.html' %}
{% block title %}New Course – ClassConnect{% endblock %}
{% block content %}
<div class="page-header animate-fade">
  <div>
    <div class="page-title">Create a Course</div>
    <div class="page-subtitle">Students enrol using the code generated after creation</div>
  </div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card animate-up" style="max-width:560px;">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Course Code</label>
        <input type="text" name="course_code" class="form-input" placeholder="e.g. CSC 406"
               style="text-transform:uppercase;" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Course Title</label>
      <input type="text" name="title" class="form-input" placeholder="e.g. Compiler Design" required>
    </div>
    <div class="form-group">
      <label class="form-label">Description <span style="color:var(--slate-400);font-weight:400;">(optional)</span></label>
      <textarea name="description" class="form-textarea" placeholder="Brief description of the course…"></textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-lg">✨ Create Course</button>
  </form>
</div>
{% endblock %}
