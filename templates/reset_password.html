{% extends 'base.html' %}
{% block title %}Reset Password – ClassConnect{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card animate-up">
    <div class="auth-logo">
      <div class="auth-logo-icon">🔑</div>
      <div class="auth-title">Choose a new password</div>
      <div class="auth-sub">Make it something you haven't used before</div>
    </div>

    <form method="POST" id="reset-form">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div style="position:relative;">
          <input type="password" name="password" id="pw-field" class="form-input"
                 placeholder="Min. 6 characters" required minlength="6">
          <button type="button" onclick="togglePw('pw-field','pw-toggle')" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--slate-400);" id="pw-toggle">👁</button>
        </div>
      </div>

      <div class="mt-1" id="pw-strength" style="display:none;">
        <div style="height:4px;border-radius:99px;background:var(--slate-200);overflow:hidden;">
          <div id="pw-bar" style="height:100%;border-radius:99px;width:0%;transition:width .3s,background .3s;"></div>
        </div>
        <span id="pw-label" style="font-size:.72rem;color:var(--slate-500);"></span>
      </div>

      <div class="form-group mt-2">
        <label class="form-label">Confirm New Password</label>
        <div style="position:relative;">
          <input type="password" name="confirm_password" id="pw-confirm-field" class="form-input"
                 placeholder="Re-enter password" required minlength="6">
          <button type="button" onclick="togglePw('pw-confirm-field','pw-confirm-toggle')" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--slate-400);" id="pw-confirm-toggle">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg mt-2" id="reset-btn">
        <span id="reset-text">Update Password</span>
        <span id="reset-spinner" style="display:none;">⏳</span>
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('login') }}">Back to Sign in</a>
    </div>
  </div>
</div>
<script>
function togglePw(fieldId, btnId) {
  const f = document.getElementById(fieldId);
  const b = document.getElementById(btnId);
  f.type = f.type === 'password' ? 'text' : 'password';
  b.textContent = f.type === 'password' ? '👁' : '🙈';
}
document.getElementById('pw-field').addEventListener('input', function() {
  const v = this.value; const bar = document.getElementById('pw-bar');
  const lbl = document.getElementById('pw-label');
  document.getElementById('pw-strength').style.display = v ? 'block' : 'none';
  let score = 0;
  if (v.length >= 6) score++;
  if (v.length >= 10) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
  const labels = ['Very weak','Weak','Fair','Strong','Very strong'];
  bar.style.width = (score * 20) + '%';
  bar.style.background = colors[score - 1] || '#ef4444';
  lbl.textContent = labels[score - 1] || '';
});
document.getElementById('reset-form').addEventListener('submit', () => {
  document.getElementById('reset-text').style.display = 'none';
  document.getElementById('reset-spinner').style.display = 'inline';
  document.getElementById('reset-btn').disabled = true;
});
</script>
{% endblock %}
